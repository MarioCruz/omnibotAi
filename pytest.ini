[pytest]
# Only the real, hardware-free unit suite lives in tests/. The util/test_*.py
# files are interactive hardware scripts (they sys.exit() at import when their
# luma/picamera deps are missing), so collecting them aborts a bare `pytest`
# run from the repo root. Pin discovery to tests/ to match the canonical
# runner: `python -m unittest discover -s tests`.
testpaths = tests
